services:
  vaultwarden:
    image: vaultwarden/server:1.34.3
    restart: always
    environment:
      - SIGNUPS_ALLOWED=true
      - ADMIN_TOKEN=${ADMIN_TOKEN}
    volumes:
      - ./vw-data:/data
    ports:
      - 11001:80
    env_file:
      - .env
    networks:
      - internal

networks:
  internal:
    external: true
    name: internal
